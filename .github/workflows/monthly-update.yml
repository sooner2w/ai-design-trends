name: Monthly Content Refresh

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run monthly content refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_content.py

      - name: Commit updated files
        run: |
          git config user.name "AlphaStack Bot"
          git config user.email "bot@alphastackapp.com"
          git add -A
          git stash
          git pull --rebase
          git stash pop
          git diff --staged --quiet || git commit -m "Monthly content refresh"
          git push
