name: Monthly Content Refresh

# Runs on the 1st of every month at 8am UTC
# Can also be triggered manually from the GitHub Actions tab
on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  refresh-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run research & update content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_content.py

      - name: Commit and push updated files
        run: |
          git config user.name  "Breon.ai Bot"
          git config user.email "actions@breon.ai"
          git add -A
          git diff --cached --quiet || git commit -m "chore: monthly content refresh $(date +'%Y-%m')"
          git push
